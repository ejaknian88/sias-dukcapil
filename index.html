<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIAS Digital</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f7a5a">
<link rel="icon" href="favicon.ico" type="image/x-icon">

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial;
}

/* splash */

#splash{
position:fixed;
width:100%;
height:100%;
background:#0f7a5a;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:9999;
}

#splash img{
width:120px;
margin-bottom:20px;
}

iframe{
width:100%;
height:100%;
border:none;
display:none;
}

</style>

</head>

<body>

<div id="splash">

<img src="logo.png">

<h2>SIAS Disdukcapil</h2>
<p>Disdukcapil Prov Sumsel</p>

</div>

<iframe id="app"
src="https://script.google.com/macros/s/AKfycbzm3A08EjNMO5q-ia98vJEAOzmGjwSc4IbvLqrlQORvvPID6EbcUT_3-N-H8RneLKlmpQ/exec"></iframe>

<script>

function isMobile() {
return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

var iframe = document.getElementById("app");

if(isMobile()){

setTimeout(function(){

document.getElementById("splash").style.display="none";
iframe.style.display="block";

},2000);

}else{

document.getElementById("splash").style.display="none";
iframe.style.display="block";

}

</script>

</body>
</html>
